<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>QR Checker КПП</title>

  <script src="https://unpkg.com/html5-qrcode"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #071a44;
      color: #fff;
      padding: 16px;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
    }

    .card {
      background: #091739;
      border: 1px solid rgba(255,255,255,.15);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow: 0 0 0 1px rgba(255,255,255,.03) inset;
    }

    h1, h2 {
      margin-top: 0;
    }

    .row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    input[type="text"] {
      flex: 1;
      min-width: 220px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #35518a;
      background: #0a1f4d;
      color: #fff;
      font-size: 16px;
    }

    button {
      padding: 14px 18px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 700;
    }

    .btn-primary {
      background: #1f7aec;
      color: #fff;
    }

    .btn-secondary {
      background: #20345f;
      color: #fff;
    }

    .btn-danger {
      background: #a71717;
      color: #fff;
    }

    .statusLine {
      margin-top: 12px;
      font-size: 15px;
      color: #c9d6ff;
      min-height: 22px;
    }

    .status-ok {
      color: #72f0a6;
    }

    .status-error {
      color: #ff8f8f;
    }

    #reader {
      width: 100%;
      min-height: 260px;
      overflow: hidden;
      border-radius: 16px;
      background: #000;
    }

    .resultBox {
      margin-top: 16px;
      display: none;
    }

    .resultCard {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .photo {
      width: 140px;
      height: 180px;
      border-radius: 14px;
      object-fit: cover;
      background: #1c2f5e;
      border: 1px solid rgba(255,255,255,.1);
    }

    .personInfo {
      flex: 1;
      min-width: 220px;
    }

    .muted {
      color: #aebce3;
      font-size: 14px;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .name {
      font-size: 30px;
      font-weight: 800;
      line-height: 1.15;
      margin: 10px 0;
    }

    .rank {
      font-size: 20px;
      color: #d3e0ff;
      margin-bottom: 12px;
    }

    .statusBox {
      margin-top: 14px;
      padding: 22px;
      border-radius: 18px;
      text-align: center;
      font-size: 32px;
      font-weight: 900;
      line-height: 1.1;
    }

    .allowed {
      background: #138a36;
      color: #fff;
    }

    .denied {
      background: #b31313;
      color: #fff;
    }

    .notfound {
      background: #b31313;
      color: #fff;
    }

    .small {
      font-size: 14px;
      color: #aebce3;
    }

    .manualRow {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .logBox {
      background: #04102a;
      border-radius: 14px;
      padding: 14px;
      max-height: 320px;
      overflow: auto;
      white-space: pre-wrap;
      font-family: monospace;
      font-size: 14px;
      color: #e8eefc;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>QR Checker КПП</h1>
      <div class="small">Источник базы: Google Sheets CSV</div>
    </div>

    <div class="card">
      <h2>1. Обновление базы</h2>
      <div class="row">
        <input
          id="csvUrl"
          type="text"
          value="https://docs.google.com/spreadsheets/d/e/2PACX-1vT4-Wq6Vt7HTqFgFSLV8EP_XQzEHzCUax5IbSUEj2vkv4ekA3y4r8y8pC_6ePxHpv6r5WzGkhnSls9m/pub?output=csv"
        />
        <button id="updateBtn" class="btn-primary">Обновить базу</button>
      </div>
      <div class="statusLine" id="updateStatus">Локальная база еще не загружена</div>
      <div class="small" style="margin-top:8px;">
        Ожидаемые колонки: id, qr_token, rank, last_name, first_name, photo_url, status
      </div>
    </div>

    <div class="card">
      <h2>2. Сканирование</h2>
      <div class="row" style="margin-bottom:10px;">
        <button id="startScanBtn" class="btn-primary">Запустить сканер</button>
        <button id="stopScanBtn" class="btn-danger">Остановить сканер</button>
      </div>
      <div id="reader"></div>

      <div class="manualRow">
        <input id="manualToken" type="text" placeholder="Ввести токен вручную" />
        <button id="manualCheckBtn" class="btn-secondary">Проверить токен</button>
      </div>
    </div>

    <div class="card">
      <h2>3. Результат</h2>
      <div class="muted" id="scannedToken">Считанный токен: —</div>

      <div class="resultBox" id="resultBox">
        <div class="resultCard">
          <img id="photo" class="photo" src="" alt="Фото" />
          <div class="personInfo">
            <div class="rank" id="rank">—</div>
            <div class="name" id="fullName">—</div>
            <div class="small">Статус в базе: <b id="statusText">—</b></div>
            <div id="resultStatus" class="statusBox denied">—</div>
          </div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>4. Журнал</h2>
      <div class="logBox" id="logBox"></div>
    </div>
  </div>

  <script>
    const DB_STORAGE_KEY = "qr_checker_local_db_v1";
    const LOG_STORAGE_KEY = "qr_checker_log_v1";

    let localDb = [];
    let html5QrCode = null;
    let scannerRunning = false;

    const $ = (id) => document.getElementById(id);

    function log(message) {
      const now = new Date().toLocaleString("ru-RU");
      const line = `[${now}] ${message}`;
      const current = JSON.parse(localStorage.getItem(LOG_STORAGE_KEY) || "[]");
      current.unshift(line);
      const trimmed = current.slice(0, 200);
      localStorage.setItem(LOG_STORAGE_KEY, JSON.stringify(trimmed));
      renderLog();
    }

    function renderLog() {
      const current = JSON.parse(localStorage.getItem(LOG_STORAGE_KEY) || "[]");
      $("logBox").textContent = current.join("\n");
    }

    function setStatus(text, type = "") {
      const el = $("updateStatus");
      el.textContent = text;
      el.className = "statusLine";
      if (type === "ok") el.classList.add("status-ok");
      if (type === "error") el.classList.add("status-error");
    }

    function saveDb(db) {
      localStorage.setItem(DB_STORAGE_KEY, JSON.stringify(db));
      localDb = db;
    }

    function loadDb() {
      const raw = localStorage.getItem(DB_STORAGE_KEY);
      if (!raw) return [];
      try {
        const parsed = JSON.parse(raw);
        if (Array.isArray(parsed)) {
          localDb = parsed;
          return parsed;
        }
      } catch (e) {}
      return [];
    }

    function getCell(obj, key) {
      return obj[key] ?? obj[String(key).trim()] ?? "";
    }

    function normalizeDriveImageUrl(url) {
      const value = String(url || "").trim();
      if (!value) return "";

      const fileMatch = value.match(/\/file\/d\/([^/]+)/i);
      if (fileMatch) {
        return `https://drive.google.com/uc?export=view&id=${fileMatch[1]}`;
      }

      const openMatch = value.match(/[?&]id=([^&]+)/i);
      if (openMatch) {
        return `https://drive.google.com/uc?export=view&id=${openMatch[1]}`;
      }

      return value;
    }

    function normalizeStatus(statusRaw) {
      return String(statusRaw || "").trim().toLowerCase();
    }

    function normalizeRow(row) {
      return {
        id: String(getCell(row, "id")).trim(),
        qr_token: String(getCell(row, "qr_token")).trim(),
        rank: String(getCell(row, "rank")).trim(),
        last_name: String(getCell(row, "last_name")).trim(),
        first_name: String(getCell(row, "first_name")).trim(),
        photo_url: normalizeDriveImageUrl(getCell(row, "photo_url")),
        status: normalizeStatus(getCell(row, "status")),
        raw: row
      };
    }

    function normalizeScannedToken(raw) {
      const s = String(raw || "").trim();
      if (!s) return "";

      if (s.startsWith("MTC:GATE-PASS:")) {
        return s.replace("MTC:GATE-PASS:", "").trim();
      }

      return s;
    }

    function findByToken(token) {
      const normalized = normalizeScannedToken(token);

      return localDb.find(r => String(r.qr_token || "").trim() === normalized)
          || localDb.find(r => String(r.id || "").trim() === normalized);
    }

    function isAllowedStatus(statusRaw) {
      const s = normalizeStatus(statusRaw);
      return s === "active";
    }

    function escapeHtml(str) {
      return String(str || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function showNotFound(decodedText) {
      $("resultBox").style.display = "block";
      $("photo").src = "";
      $("photo").style.display = "none";
      $("rank").textContent = "—";
      $("fullName").textContent = "—";
      $("statusText").textContent = "—";
      $("resultStatus").textContent = "ПРОПУСК НЕ НАЙДЕН";
      $("resultStatus").className = "statusBox notfound";
      $("scannedToken").textContent = `Считанный токен: ${decodedText}`;
      log(`Сканирован токен ${decodedText}: не найден`);
    }

    function showResult(row, decodedText) {
      const allowed = isAllowedStatus(row.status);

      $("resultBox").style.display = "block";
      $("scannedToken").textContent =
        `Считанный токен: ${decodedText} → ${normalizeScannedToken(decodedText)}`;

      if (row.photo_url) {
        $("photo").src = row.photo_url;
        $("photo").style.display = "block";
      } else {
        $("photo").src = "";
        $("photo").style.display = "none";
      }

      $("rank").textContent = row.rank || "—";
      $("fullName").textContent = `${row.last_name || ""} ${row.first_name || ""}`.trim() || "—";
      $("statusText").textContent = row.status || "—";
      $("resultStatus").textContent = allowed ? "ДОСТУП РАЗРЕШЕН" : "ДОСТУП ЗАПРЕЩЕН";
      $("resultStatus").className = `statusBox ${allowed ? "allowed" : "denied"}`;

      log(
        `Сканирован токен ${decodedText} → ${normalizeScannedToken(decodedText)}: ` +
        `${row.last_name || ""} ${row.first_name || ""}, статус=${row.status || "—"}, ` +
        `${allowed ? "доступ разрешен" : "доступ запрещен"}`
      );
    }

    async function updateDatabase() {
      const url = $("csvUrl").value.trim();
      if (!url) {
        setStatus("Укажи ссылку на CSV", "error");
        return;
      }

      setStatus("Загрузка базы...");
      try {
        const response = await fetch(url, { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const csvText = await response.text();

        const parsed = Papa.parse(csvText, {
          header: true,
          skipEmptyLines: true
        });

        if (parsed.errors && parsed.errors.length) {
          console.warn(parsed.errors);
        }

        const normalized = parsed.data
          .map(normalizeRow)
          .filter(r => r.qr_token || r.id);

        saveDb(normalized);
        setStatus(`База обновлена. Загружено записей: ${normalized.length}`, "ok");
        log(`База обновлена. Загружено записей: ${normalized.length}`);
      } catch (err) {
        console.error(err);
        setStatus(`Ошибка обновления: ${err.message}`, "error");
        log(`Ошибка обновления базы: ${err.message}`);
      }
    }

    async function startScanner() {
      if (scannerRunning) return;

      if (!html5QrCode) {
        html5QrCode = new Html5Qrcode("reader");
      }

      try {
        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 220 },
          (decodedText) => {
            const row = findByToken(decodedText);
            if (!row) {
              showNotFound(decodedText);
              return;
            }
            showResult(row, decodedText);
          },
          () => {}
        );
        scannerRunning = true;
        log("Сканер запущен");
      } catch (err) {
        console.error(err);
        log(`Ошибка запуска сканера: ${err.message}`);
        alert("Не удалось запустить сканер. Проверь доступ к камере.");
      }
    }

    async function stopScanner() {
      if (!html5QrCode || !scannerRunning) return;
      try {
        await html5QrCode.stop();
        await html5QrCode.clear();
        scannerRunning = false;
        log("Сканер остановлен");
      } catch (err) {
        console.error(err);
        log(`Ошибка остановки сканера: ${err.message}`);
      }
    }

    function manualCheck() {
      const value = $("manualToken").value.trim();
      if (!value) return;

      const row = findByToken(value);
      if (!row) {
        showNotFound(value);
        return;
      }

      showResult(row, value);
    }

    $("updateBtn").addEventListener("click", updateDatabase);
    $("startScanBtn").addEventListener("click", startScanner);
    $("stopScanBtn").addEventListener("click", stopScanner);
    $("manualCheckBtn").addEventListener("click", manualCheck);

    $("manualToken").addEventListener("keydown", (e) => {
      if (e.key === "Enter") manualCheck();
    });

    loadDb();
    renderLog();

    if (localDb.length) {
      setStatus(`Локальная база загружена. Записей: ${localDb.length}`, "ok");
    } else {
      setStatus("Локальная база еще не загружена");
    }
  </script>
</body>
</html>
